<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

model-viewer{
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<model-viewer
src="munk.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
autoplay
shadow-intensity="1"
exposure="0.8">

</model-viewer>

</body>
</html>
